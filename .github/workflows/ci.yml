name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        # Pipeline deps too: the data-layer and longitudinal tests mock the
        # network but still import geopandas/requests/etc., so the light
        # serving deps alone can't even collect them.
        run: pip install -r requirements-dev.txt -r requirements-pipeline.txt

      - name: Ruff lint
        run: ruff check api/ tests/ scripts/

      - name: Pytest
        run: pytest tests/ -q

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build frontend
        run: |
          cd frontend
          npm ci
          npm run build
